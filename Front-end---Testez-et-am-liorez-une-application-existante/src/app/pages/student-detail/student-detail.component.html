<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="row justify-content-end">
      <div class="col-auto m-3">
        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="logout()"
          >
          Disconnect
        </button>
      </div>
    </div>
    @if (currentStudent) {
      <div class="card m-3">
        <h5 class="card-header">Student informations</h5>
        <div class="card-body">
          <p><strong>First name :</strong> {{ currentStudent.firstName }}</p>
          <p><strong>Last name :</strong> {{ currentStudent.lastName }}</p>
          <p><strong>Date of birth :</strong> {{ currentStudent.dateOfBirth }}</p>
        </div>
      </div>
    }
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card m-3">
      <h5 class="card-header">Modify student informations</h5>
      <div class="card-body">
        <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="firstName">First name</label>
            <input
              type="text"
              id="firstName"
              formControlName="firstName"
              class="form-control"
              />
            </div>

            <div class="form-group">
              <label for="lastName">Last name</label>
              <input
                type="text"
                id="lastName"
                formControlName="lastName"
                class="form-control"
                />
              </div>

              <div class="form-group">
                <label for="dateOfBirth">Date of birth</label>
                <input
                  type="date"
                  id="dateOfBirth"
                  formControlName="dateOfBirth"
                  class="form-control"
                  />
                </div>

                <div class="d-flex justify-content-between">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    [disabled]="!studentForm.valid"
                    >
                    Update
                  </button>

                  <button
                    type="button"
                    class="btn btn-danger"
                    (click)="deleteStudent()"
                    >
                    Delete
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
